name: myschedule
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'
 
dependencies:
  flutter:
    sdk: flutter
  # State Management
  provider: ^6.1.1
  # HTTP Client
  http: ^1.2.0
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # UI
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  table_calendar: ^3.1.2
  flutter_slidable: ^3.1.0
  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  # Icons
  cupertino_icons: ^1.0.6
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
 
flutter:
  uses-material-design: true
  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
 